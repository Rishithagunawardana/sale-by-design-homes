name: Website CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify HTML Files
      run: |
        find . -name "*.html" -exec echo "Checking {}" \;
        # In a real setup, we could use an HTML linter here
        
    - name: Check CSS Consistency
      run: |
        find . -name "*.css" -exec echo "Checking {}" \;

    - name: Success Notification
      run: echo "Code verified and ready for deployment."

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_SALE_BY_DESIGN_HOMES_CDE1B }}"
          projectId: sale-by-design-homes-cde1b
          channelId: live
