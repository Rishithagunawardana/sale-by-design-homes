<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Client Portal | Sale by Design Homes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "primary-container": "#1d4ed8",
                        "background": "var(--background)",
                        "on-background": "var(--on-background)",
                        "surface": "var(--surface)",
                        "on-surface": "var(--on-surface)",
                        "outline": "rgba(203, 213, 225, 0.6)",
                    },
                    fontFamily: { "body": ["Manrope"] }
                },
            },
        }
    </script>
    <style>
        :root { --background: #ffffff; --on-background: #0f172a; --surface: #ffffff; --on-surface: #0f172a; --on-surface-variant: #64748b; --primary: #2563eb; --primary-container: #ebf2ff; --outline: rgba(203, 213, 225, 0.6); --surface-container: #ffffff; --surface-container-high: #f8fafc; }
        .dark { --background: #0d121a; --on-background: #f1f5f9; --surface: #0d121a; --on-surface: #f1f5f9; --on-surface-variant: #94a3b8; --primary: #2374e7; --primary-container: #1a5bbd; --outline: rgba(45, 58, 79, 0.4); --surface-container: #161c27; --surface-container-high: #1e2635; }
        .premium-gradient { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%); }
        @keyframes revealUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .reveal { opacity: 0; animation: revealUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        .stagger-3 { animation-delay: 0.3s; }
    </style>
    <script>
        const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.className = theme;
    </script>
</head>
<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
    <main class="min-h-screen grid grid-cols-1 lg:grid-cols-2">
        <!-- Left: Form -->
        <section class="flex flex-col justify-center px-8 lg:px-20 py-12 bg-surface relative z-10">
            <div class="max-w-md w-full mx-auto">
                <div class="mb-12 reveal">
                    <a href="index.html" class="flex items-center gap-2 group">
                        <img alt="Logo" class="h-10 w-auto group-hover:scale-105 transition-transform" src="https://lh3.googleusercontent.com/aida/ADBb0uh2o6SDHD59hlLQsTA8tvOQwToULUaZ6vZbl2YqfwLXBX3ho2LmpkN7VHlowRTvtpG_fI-r0RS8BytlYWk0JDxuDoKDmWknPTlJt4PiTTM2di3eAN-CfekXeDJNaHrvYCwZw-7Jh8g29BV6S8s4xLae68AqEcIyveMJLSW9Ilk6x5O6M1c61COiWLiHWRyA8WKN2PTn0qFomjmYBqEd-nnDv24z7aZiQW3gdZEmXVXyqfB986o0oydfuZg2Z3d_TybTLj99p7eO3Q" />
                    </a>
                </div>
                <header class="mb-10 reveal stagger-1">
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-primary font-black uppercase tracking-[0.2em] text-[9px] mb-4">
                        <span class="material-symbols-outlined text-sm">house</span> Homeowner Dashboard
                    </div>
                    <h1 class="text-4xl font-black tracking-tighter mb-3 leading-tight">Welcome Home</h1>
                    <p class="text-on-surface-variant font-medium">Track your property's staging transformation in real-time.</p>
                </header>
                <form class="space-y-6 reveal stagger-2">
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-on-surface-variant/80 ml-1" for="email">Portal User Email</label>
                        <input class="w-full bg-surface-container-high border border-outline/30 text-on-surface rounded-2xl px-5 py-4 focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all text-sm font-medium" id="email" placeholder="owner@yourhome.com" type="email" required />
                    </div>
                    <div class="space-y-2">
                        <label class="block text-[10px] font-black uppercase tracking-widest text-on-surface-variant/80 ml-1" for="password">Security Password</label>
                        <input class="w-full bg-surface-container-high border border-outline/30 text-on-surface rounded-2xl px-5 py-4 focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all text-sm font-medium" id="password" placeholder="••••••••••••" type="password" required />
                    </div>
                    <button class="w-full py-5 rounded-2xl premium-gradient text-white font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-primary/40 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3 group" type="submit">
                        Access My Portfolio <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_right_alt</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- Right: Bento Content -->
        <section class="hidden lg:flex flex-col bg-background relative overflow-hidden items-center justify-center p-12 lg:p-20">
            <div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent"></div>
            <div class="relative z-10 w-full max-w-2xl">
                <!-- Bento Grid -->
                <div class="grid grid-cols-6 grid-rows-4 gap-4 aspect-[4/3] reveal stagger-1">
                    <!-- Value Added -->
                    <div class="col-span-4 row-span-2 bg-surface-container-high border border-outline/20 rounded-[48px] p-10 shadow-2xl flex flex-col justify-between">
                        <div class="bg-primary/10 w-fit p-4 rounded-3xl"><span class="material-symbols-outlined text-primary text-4xl">trending_up</span></div>
                        <div>
                            <div class="text-[10px] font-black uppercase tracking-widest text-on-surface-variant mb-2">Avg. Value Added</div>
                            <div class="text-6xl font-black text-on-surface tracking-tighter">$1.2M<span class="text-xl opacity-40 uppercase ml-2 tracking-widest">+</span></div>
                        </div>
                    </div>
                    <!-- Happy Owners -->
                    <div class="col-span-2 row-span-1 bg-background border border-outline/30 rounded-[32px] p-6 flex items-center gap-4">
                        <span class="material-symbols-outlined text-primary text-3xl">mood</span>
                        <div>
                            <div class="text-xl font-black">5,000+</div>
                            <div class="text-[8px] font-black text-on-surface-variant uppercase tracking-widest">Happy Owners</div>
                        </div>
                    </div>
                    <!-- Portfolio Status -->
                    <div class="col-span-2 row-span-1 bg-primary text-white rounded-[32px] p-6 flex flex-col justify-center">
                        <div class="text-[8px] font-black uppercase tracking-widest opacity-60 mb-1">Staging Status</div>
                        <div class="text-lg font-bold flex items-center gap-2">Live Progress <span class="w-2 h-2 rounded-full bg-white animate-pulse"></span></div>
                    </div>
                    <!-- Interior Masonry Preview -->
                    <div class="col-span-6 row-span-2 grid grid-cols-3 gap-4">
                        <div class="rounded-[32px] overflow-hidden shadow-xl hover:scale-105 transition-transform duration-500">
                            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover" alt="Interior" />
                        </div>
                        <div class="rounded-[32px] overflow-hidden shadow-xl hover:scale-105 transition-transform duration-500 translate-y-4">
                            <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover" alt="Interior" />
                        </div>
                        <div class="rounded-[32px] overflow-hidden shadow-xl hover:scale-105 transition-transform duration-500">
                            <img src="https://images.unsplash.com/photo-1600121848594-d8644e57abab?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover" alt="Interior" />
                        </div>
                    </div>
                </div>
            </div>
            <!-- Theme Toggle -->
            <button id="theme-toggle" class="absolute top-10 right-10 p-4 rounded-2xl bg-surface-container-high border border-outline/50 shadow-2xl hover:scale-110 active:scale-95 transition-all text-on-surface">
                <span class="material-symbols-outlined dark:hidden">dark_mode</span>
                <span class="material-symbols-outlined hidden dark:block">light_mode</span>
            </button>
        </section>
    </main>
    <div id="notification-container" class="fixed bottom-10 right-10 z-50"></div>
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        toggleBtn.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const container = document.getElementById('notification-container');
            container.innerHTML = `<div class="reveal animate-slide-in p-6 rounded-3xl bg-surface-container-high border border-primary/20 shadow-2xl backdrop-blur-xl relative overflow-hidden">
                <div class="absolute inset-y-0 left-0 w-1.5 bg-primary"></div>
                <div class="flex items-center gap-4">
                    <div class="bg-primary/10 p-3 rounded-2xl"><span class="material-symbols-outlined text-primary">login</span></div>
                    <div><h3 class="text-sm font-black">Portal Access Granted</h3><p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-wider">Syncing property status...</p></div>
                </div></div>`;
            setTimeout(() => window.location.href = 'dashboard.html', 1500);
        });
    </script>
</body>
</html>
